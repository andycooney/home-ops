---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-dns
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: cloudflare-dns-secret
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: api-token
      remoteRef:
        key: cloudflare
        property: CLOUDFLARE_API_TOKEN
