---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/pushsecret_v1alpha1.json
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: cooney-online-production-tls
spec:
  secretStoreRefs:
    - name: onepassword-connect
      kind: ClusterSecretStore
  selector:
    secret:
      name: cooney-online-production-tls
  template:
    data:
      tls.crt: '{{ index . "tls.crt" | b64enc }}'
      tls.key: '{{ index . "tls.key" | b64enc }}'
  data:
    - match:
        secretKey: &cooneyOnlineCrt tls.crt
        remoteRef:
          remoteKey: cooney-online-production-tls
          property: *cooneyOnlineCrt
    - match:
        secretKey: &cooneyOnlineKey tls.key
        remoteRef:
          remoteKey: cooney-online-production-tls
          property: *cooneyOnlineKey
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/pushsecret_v1alpha1.json
