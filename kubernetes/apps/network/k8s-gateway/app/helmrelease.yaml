---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: k8s-gateway
spec:
  chartRef:
    kind: OCIRepository
    name: k8s-gateway
  interval: 1h
  values:
    fullnameOverride: k8s-gateway
    domain: "${INTERNAL_DOMAIN}"
    ttl: 1
    service:
      type: LoadBalancer
      port: 53
      annotations:
        lbipam.cilium.io/ips: "172.16.17.51"
      externalTrafficPolicy: Cluster
    watchedResources: ["HTTPRoute", "Service"]
  postRenderers:
    - kustomize:
        patches:
          - target:
              version: v1
              kind: Service
              name: k8s-gateway
            patch: |
              - op: add
                path: /metadata/labels/bgp.cilium.io~1advertise
                value: "true"
