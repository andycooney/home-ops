---
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: internal-gateway
spec:
  endpoints:
    - dnsName: internal.cooney.site
      recordType: A
      targets:
        - 192.168.60.1
    - dnsName: echo.cooney.site
      recordType: CNAME
      targets:
        - internal.cooney.site
    - dnsName: flux-webhook.cooney.site
      recordType: CNAME
      targets:
        - internal.cooney.site
