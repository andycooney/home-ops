apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: postgres
  namespace: database
spec:
  suspend: true
  targetNamespace: database
  commonMetadata:
    labels:
      app.kubernetes.io/name: postgres
  components:
    - ../../../../components/volsync
  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph
  path: ./kubernetes/apps/database/postgres/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  postBuild:
    substitute:
      APP: postgres
      VOLSYNC_CLAIM: postgres
      VOLSYNC_SECRET_KEY: postgres
      VOLSYNC_CAPACITY: 60Gi
