---
# yaml-language-server: =https://k8s-schemas.home-operations.com/postgresql.cnpg.io/cluster_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-cnpg
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:17
  enableSuperuserAccess: true

  bootstrap:
    initdb:
      database: app
      owner: app

  storage:
    size: 20Gi
    storageClass: ceph-block

  monitoring:
    enablePodMonitor: true

  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 1Gi
