---
apiVersion: batch/v1
kind: Job
metadata:
  name: atuin-db-bootstrap
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          image: ghcr.io/cloudnative-pg/postgresql:18
          env:
            - name: PGHOST
              value: postgres-cnpg-rw.database.svc.cluster.local
            - name: PGPORT
              value: "5432"
            - name: PGDATABASE
              value: postgres
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: postgres-cnpg-superuser
                  key: username
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-cnpg-superuser
                  key: password
            - name: ATUIN_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: atuin-db-secret
                  key: ATUIN_DB_NAME
            - name: ATUIN_DB_USER
              valueFrom:
                secretKeyRef:
                  name: atuin-db-secret
                  key: ATUIN_DB_USER
            - name: ATUIN_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: atuin-db-secret
                  key: ATUIN_DB_PASSWORD
          command:
            - /bin/bash
            - -ec
            - |
              until pg_isready -h "${PGHOST}" -p "${PGPORT}" -U "${PGUSER}"; do
                sleep 2
              done

              ROLE_EXISTS="$(psql -tAc "SELECT 1 FROM pg_catalog.pg_roles WHERE rolname='${ATUIN_DB_USER}'")"
              if [ "${ROLE_EXISTS}" != "1" ]; then
                psql -v ON_ERROR_STOP=1 -c "CREATE ROLE \"${ATUIN_DB_USER}\" LOGIN PASSWORD '${ATUIN_DB_PASSWORD}'"
              else
                psql -v ON_ERROR_STOP=1 -c "ALTER ROLE \"${ATUIN_DB_USER}\" WITH PASSWORD '${ATUIN_DB_PASSWORD}'"
              fi

              DB_EXISTS="$(psql -tAc "SELECT 1 FROM pg_database WHERE datname='${ATUIN_DB_NAME}'")"
              if [ "${DB_EXISTS}" != "1" ]; then
                psql -v ON_ERROR_STOP=1 -c "CREATE DATABASE \"${ATUIN_DB_NAME}\" OWNER \"${ATUIN_DB_USER}\""
              fi

              psql -v ON_ERROR_STOP=1 -c "GRANT ALL PRIVILEGES ON DATABASE \"${ATUIN_DB_NAME}\" TO \"${ATUIN_DB_USER}\""
