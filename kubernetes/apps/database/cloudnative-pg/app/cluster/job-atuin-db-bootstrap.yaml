---
apiVersion: batch/v1
kind: Job
metadata:
  name: atuin-db-bootstrap
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          image: ghcr.io/cloudnative-pg/postgresql:17
          env:
            - name: PGHOST
              value: postgres-cnpg-rw.database.svc.cluster.local
            - name: PGPORT
              value: "5432"
            - name: PGDATABASE
              value: postgres
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: postgres-cnpg-superuser
                  key: username
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-cnpg-superuser
                  key: password
            - name: ATUIN_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: atuin-db-secret
                  key: ATUIN_DB_NAME
            - name: ATUIN_DB_USER
              valueFrom:
                secretKeyRef:
                  name: atuin-db-secret
                  key: ATUIN_DB_USER
            - name: ATUIN_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: atuin-db-secret
                  key: ATUIN_DB_PASSWORD
          command:
            - /bin/bash
            - -ec
            - |
              until pg_isready -h "${PGHOST}" -p "${PGPORT}" -U "${PGUSER}"; do
                sleep 2
              done

              cat >/tmp/bootstrap.sql <<EOSQL
              DO \$\$
              BEGIN
                IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = '${ATUIN_DB_USER}') THEN
                  EXECUTE format('CREATE ROLE %I LOGIN PASSWORD %L', '${ATUIN_DB_USER}', '${ATUIN_DB_PASSWORD}');
                ELSE
                  EXECUTE format('ALTER ROLE %I WITH PASSWORD %L', '${ATUIN_DB_USER}', '${ATUIN_DB_PASSWORD}');
                END IF;
              END
              \$\$;

              SELECT format('CREATE DATABASE %I OWNER %I', '${ATUIN_DB_NAME}', '${ATUIN_DB_USER}')
              WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = '${ATUIN_DB_NAME}')\gexec

              GRANT ALL PRIVILEGES ON DATABASE "${ATUIN_DB_NAME}" TO "${ATUIN_DB_USER}";
EOSQL

              psql -v ON_ERROR_STOP=1 -f /tmp/bootstrap.sql
