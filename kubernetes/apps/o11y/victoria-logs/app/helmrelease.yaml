---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-logs
spec:
  chartRef:
    kind: OCIRepository
    name: victoria-logs
  interval: 1h
  values:
    global:
      image:
        registry: quay.io
    dashboards:
      enabled: true
      grafanaOperator:
        enabled: true
    server:
      fullnameOverride: victoria-logs
      retentionPeriod: 14d
      retentionDiskSpaceUsage: 15GiB
      persistentVolume:
        enabled: true
        storageClassName: ceph-block
        size: 20Gi
      resources:
        requests:
          cpu: 10m
          memory: 128Mi
        limits:
          memory: 768Mi
      route:
        enabled: true
        annotations:
          gatus.home-operations.com/endpoint: |-
            conditions: ["[STATUS] == 200"]
        hostnames:
          - victoria-logs.cooney.site
          - logs.cooney.site
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
      serviceMonitor:
        enabled: true
