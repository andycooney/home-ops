---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
spec:
  chartRef:
    kind: OCIRepository
    name: kube-prometheus-stack
  interval: 1h
  valuesFrom:
    - kind: ConfigMap
      name: flux-metrics-configmap
      valuesKey: flux-metrics.yaml
  values:
    cleanPrometheusOperatorObjectNames: true
    alertmanager:
      route:
        main:
          enabled: true
          hostnames:
            - alertmanager.cooney.site
          parentRefs:
            - name: envoy-internal
              namespace: network
              sectionName: https
      alertmanagerSpec:
        alertmanagerConfiguration:
          name: alertmanager
        externalUrl: https://alertmanager.cooney.site
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: ceph-block
              resources:
                requests:
                  storage: 1Gi
    kubeEtcd:
      service:
        selector:
          component: kube-apiserver # etcd runs on control plane nodes
    kubeProxy:
      enabled: false
    defaultRules:
      disabled:
        KubeMemoryOvercommit: true
        KubeCPUOvercommit: true
        KubeHpaMaxedOut: true
    prometheus:
      route:
        main:
          enabled: true
          hostnames:
            - prometheus.cooney.site
          parentRefs:
            - name: envoy-internal
              namespace: network
              sectionName: https
      prometheusSpec:
        externalUrl: https://prometheus.cooney.site
        podMonitorSelectorNilUsesHelmValues: false
        probeSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
        scrapeConfigSelectorNilUsesHelmValues: false
        serviceMonitorSelectorNilUsesHelmValues: false
        retention: 30d
        retentionSize: 50GB
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            memory: 4Gi
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: ceph-block
              resources:
                requests:
                  storage: 50Gi
    prometheus-node-exporter:
      fullnameOverride: node-exporter
    kube-state-metrics:
      fullnameOverride: kube-state-metrics
    grafana:
      enabled: false
      forceDeployDashboards: true
      operator:
        dashboardsConfigMapRefEnabled: true
        folder: o11y
        matchLabels:
          dashboards: grafana
    additionalPrometheusRulesMap:
      kube-overcommit-rules:
        groups:
          - name: kube-overcommit-custom
            rules:
              - alert: KubeCPUOvercommit
                annotations:
                  description: Cluster {{ $labels.cluster }} has overcommitted CPU requests above 99% of allocatable CPU.
                  runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubecpuovercommit
                  summary: Cluster has overcommitted CPU resource requests.
                expr: |-
                  sum(namespace_cpu:kube_pod_container_resource_requests:sum{job="kube-state-metrics"}) by (cluster)
                    /
                  sum(kube_node_status_allocatable{job="kube-state-metrics",resource="cpu"}) by (cluster)
                    > 0.99
                for: 10m
                labels:
                  severity: warning
              - alert: KubeMemoryOvercommit
                annotations:
                  description: Cluster {{ $labels.cluster }} has overcommitted memory requests above 99% of allocatable memory.
                  runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubememoryovercommit
                  summary: Cluster has overcommitted memory resource requests.
                expr: |-
                  sum(namespace_memory:kube_pod_container_resource_requests:sum{job="kube-state-metrics"}) by (cluster)
                    /
                  sum(kube_node_status_allocatable{job="kube-state-metrics",resource="memory"}) by (cluster)
                    > 0.99
                for: 10m
                labels:
                  severity: warning
      kube-hpa-rules:
        groups:
          - name: kube-hpa-custom
            rules:
              - alert: KubeHpaMaxedOut
                annotations:
                  description: HPA {{ $labels.namespace }}/{{ $labels.horizontalpodautoscaler }} has been running at max replicas for longer than 15 minutes on cluster {{ $labels.cluster }}.
                  runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubehpamaxedout
                  summary: HPA is running at max replicas
                expr: |-
                  (
                    kube_horizontalpodautoscaler_status_current_replicas{job="kube-state-metrics", namespace=~".*"}
                      ==
                    kube_horizontalpodautoscaler_spec_max_replicas{job="kube-state-metrics", namespace=~".*"}
                  )
                  and on (namespace, horizontalpodautoscaler, cluster) (
                    kube_horizontalpodautoscaler_spec_max_replicas{job="kube-state-metrics", namespace=~".*"}
                      > 1
                  )
                for: 15m
                labels:
                  severity: warning
      dockerhub-rules:
        groups:
          - name: dockerhub
            rules:
              - alert: DockerhubRateLimitRisk
                annotations:
                  summary: There are {{ $value }} containers pulling from Dockerhub. This may lead to rate limiting.
                expr: count(time() - container_last_seen{image=~"(docker.io).*",container!=""} < 30) > 100
                labels:
                  severity: critical
      oom-rules:
        groups:
          - name: oom
            rules:
              - alert: OomKilled
                annotations:
                  summary: Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }} has been OOMKilled {{ $value }} times in the last 10 minutes.
                expr: (kube_pod_container_status_restarts_total - kube_pod_container_status_restarts_total offset 10m >= 1) and ignoring (reason) min_over_time(kube_pod_container_status_last_terminated_reason{reason="OOMKilled"}[10m]) == 1
                labels:
                  severity: critical
