router bgp 64513
 bgp router-id 172.16.1.1
 bgp log-neighbor-changes
 no bgp ebgp-requires-policy
 !
 neighbor TALOS peer-group
 neighbor TALOS remote-as 64514
 neighbor TALOS description Cilium BGP peers
 neighbor TALOS timers 10 30

 ! Old Talos/Cilium peers kept temporarily for the 172.16 readdress cutover.
 neighbor 192.168.42.11 peer-group TALOS
 neighbor 192.168.42.12 peer-group TALOS
 neighbor 192.168.42.13 peer-group TALOS

 ! New Talos/Cilium peers.
 neighbor 172.16.16.11 peer-group TALOS
 neighbor 172.16.16.12 peer-group TALOS
 neighbor 172.16.16.13 peer-group TALOS
 !
 address-family ipv4 unicast
  neighbor TALOS activate
  neighbor TALOS soft-reconfiguration inbound
  neighbor TALOS route-map K8S-BGP-IN in
  neighbor TALOS route-map K8S-BGP-OUT out
  maximum-paths 3
 exit-address-family
!
exit
!
! Old Kubernetes LoadBalancer VIP range kept temporarily for the 172.16 readdress cutover.
ip prefix-list K8S-LB-VIPS seq 10 permit 192.168.60.0/24 le 32

! New Kubernetes LoadBalancer / frontend VIP range.
ip prefix-list K8S-LB-VIPS seq 20 permit 172.16.17.0/24 le 32
!
route-map K8S-BGP-IN permit 10
 match ip address prefix-list K8S-LB-VIPS
exit
!
route-map K8S-BGP-IN deny 999
exit
!
route-map K8S-BGP-OUT deny 10
exit
!
