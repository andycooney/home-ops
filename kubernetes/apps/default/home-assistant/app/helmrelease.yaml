---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: home-assistant
spec:
  chartRef:
    kind: OCIRepository
    name: home-assistant
  interval: 1h
  values:
    controllers:
      home-assistant:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/home-assistant
              tag: 2026.6.0@sha256:f89628f4623e2b99f368baa6c8ee4e6ca5856f9ad18fe9c36d0af53fe5d5ee29
            env:
              TZ: America/New_York
              HASS_HTTP_TRUSTED_PROXY_1: 10.42.0.0/16
              HASS_HTTP_TRUSTED_PROXY_2: 10.43.0.0/16
              HASS_HTTP_TRUSTED_PROXY_3: 192.168.0.0/16
              HASS_LATITUDE:
                valueFrom:
                  secretKeyRef:
                    name: home-assistant-secret
                    key: HASS_LATITUDE
              HASS_LONGITUDE:
                valueFrom:
                  secretKeyRef:
                    name: home-assistant-secret
                    key: HASS_LONGITUDE
              HASS_ELEVATION:
                valueFrom:
                  secretKeyRef:
                    name: home-assistant-secret
                    key: HASS_ELEVATION
              HASS_LUTRON_USER:
                valueFrom:
                  secretKeyRef:
                    name: home-assistant-secret
                    key: HASS_LUTRON_USER
              HASS_LUTRON_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: home-assistant-secret
                    key: HASS_LUTRON_PASSWORD
              HASS_TWILIO_ACCOUNT_SID:
                valueFrom:
                  secretKeyRef:
                    name: home-assistant-secret
                    key: HASS_TWILIO_ACCOUNT_SID
              HASS_TWILIO_AUTH_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: home-assistant-secret
                    key: HASS_TWILIO_AUTH_TOKEN
              HASS_RECORDER_DB_URL:
                valueFrom:
                  secretKeyRef:
                    name: home-assistant-secret
                    key: HASS_RECORDER_DB_URL
            probes:
              liveness:
                enabled: true
                spec:
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &port 8123
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            appProtocol: kubernetes.io/ws
            port: *port
    route:
      internal:
        hostnames:
          - home-assistant.cooney.site
          - hass.cooney.site
          - ha.cooney.site
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
    persistence:
      config:
        existingClaim: home-assistant
        globalMounts:
          - path: /config
      config-cache:
        existingClaim: home-assistant-cache
        globalMounts:
          - path: /config/.venv
      tmp:
        type: emptyDir
