

---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: sabnzbd
spec:
  targetNamespace: default
  commonMetadata:
    labels:
      app.kubernetes.io/name: sabnzbd
  path: ./kubernetes/apps/default/sabnzbd/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  postBuild:
    substitute:
      APP: sabnzbd
      VOLSYNC_CLAIM: sabnzbd
      VOLSYNC_SECRET_KEY: sabnzbd
      VOLSYNC_SECRET_PROPERTY: SABNZBD_VOLSYNC