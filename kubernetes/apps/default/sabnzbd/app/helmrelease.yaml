---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sabnzbd
spec:
  chartRef:
    kind: OCIRepository
    name: sabnzbd
  interval: 1h
  values:
    controllers:
      sabnzbd:
        containers:
          gluetun:
            image:
              repository: ghcr.io/qdm12/gluetun
              tag: v3.41.1
            env:
              VPN_SERVICE_PROVIDER: custom
              VPN_TYPE: wireguard
              FIREWALL_INPUT_PORTS: "80"
              FIREWALL_OUTBOUND_SUBNETS: 172.16.20.0/22,172.16.24.0/22,192.168.0.0/16,172.16.0.0/12
              DNS_ADDRESS: 1.1.1.1
              DOT: "off"
              IPV6: "off"
              DOT_IPV6: "off"
              TZ: America/New_York
              WIREGUARD_CONF_SECRET_FILE: /gluetun/wireguard/wg0.conf
            envFrom:
              - secretRef:
                  name: sabnzbd-vpn-secret
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              allowPrivilegeEscalation: false
              capabilities:
                add: ["NET_ADMIN"]
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 512Mi
          app:
            image:
              repository: ghcr.io/home-operations/sabnzbd
              tag: 5.0.4@sha256:0c78c4752607d6d3fca43817af3540dad515c48dbab2c980ef7ef5bc27849b2b
            env:
              SABNZBD__PORT: &port 80
              SABNZBD__HOST_WHITELIST_ENTRIES: sabnzbd,sabnzbd.default,sabnzbd.default.svc,sabnzbd.default.svc.cluster.local,sabnzbd.cooney.site,sabnzbd.cooney.online,radarr,radarr.default,radarr.default.svc,radarr.default.svc.cluster.local,sonarr,sonarr.default,sonarr.default.svc,sonarr.default.svc.cluster.local,whisparr,whisparr.default,whisparr.default.svc,whisparr.default.svc.cluster.local
              TZ: America/New_York
            probes:
              liveness:
                enabled: true
                spec:
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api?mode=version
                    port: *port
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext:
              runAsNonRoot: true
              runAsUser: 1000
              runAsGroup: 1000
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 4Gi
    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: *port
    route:
      internal:
        hostnames:
          - sabnzbd.cooney.site
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
      external:
        hostnames:
          - sabnzbd.cooney.online
        parentRefs:
          - name: envoy-external
            namespace: network
            sectionName: https
    persistence:
      tun:
        type: hostPath
        hostPath: /dev/net/tun
        hostPathType: CharDevice
        advancedMounts:
          sabnzbd:
            gluetun:
              - path: /dev/net/tun
      config:
        existingClaim: sabnzbd
      media:
        type: nfs
        server: storage.cooney.site
        path: /media
        globalMounts:
          - path: /media
      unprocessed:
        type: nfs
        server: storage.cooney.site
        path: /unprocessed
        globalMounts:
          - path: /unprocessed
      tmp:
        type: emptyDir
      wireguard:
        type: secret
        name: sabnzbd-pia-wg-va-secret
        advancedMounts:
          sabnzbd:
            gluetun:
              - path: /gluetun/wireguard/wg0.conf
                subPath: wg0.conf
                readOnly: true
