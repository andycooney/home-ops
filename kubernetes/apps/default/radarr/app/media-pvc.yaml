---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: radarr-media
spec:
  accessModes:
    - ReadWriteMany
  capacity:
    storage: 1Gi
  mountOptions:
    - nfsvers=4.2
    - nosharecache
  nfs:
    path: /mnt/bytebarn/media/movies
    server: storage.cooney.site
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: radarr-media
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1Gi
  storageClassName: ""
  volumeName: radarr-media
