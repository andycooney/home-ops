---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: plex
spec:
  suspend: true
  chartRef:
    kind: OCIRepository
    name: plex
  interval: 1h
  values:
    controllers:
      plex:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/plex
              tag: 1.43.3.10828@sha256:0c0b6899339503af17cb190b25af6acf10f0030e2820985e16ee14ef428f49d7
            env:
              TZ: America/New_York
              PLEX_ADVERTISE_URL: "https://plex.cooney.site:443,http://172.16.17.40:32400,http://plex.default.svc.cluster.local:32400"
              PLEX_NO_AUTH_NETWORKS: "172.16.1.0/24"
            probes:
              liveness:
                enabled: true
                spec:
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /identity
                    port: &port 32400
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              claims:
                - name: gpu
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 16Gi
    defaultPodOptions:
      resourceClaims:
        - name: gpu
          resourceClaimTemplateName: plex
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: *port
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: 172.16.17.40
        externalTrafficPolicy: Local
        labels:
          bgp.cilium.io/advertise: "true"
    route:
      internal:
        hostnames:
          - plex.cooney.site
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - filters:
              - type: RequestHeaderModifier
                requestHeaderModifier:
                  remove:
                    - Range
            matches:
              - path:
                  type: PathPrefix
                  value: /library/streams
            backendRefs:
              - name: plex
                port: 32400
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - name: plex
                port: 32400
      external:
        hostnames:
          - plex.cooney.online
        parentRefs:
          - name: envoy-external
            namespace: network
        rules:
          - filters:
              - type: RequestHeaderModifier
                requestHeaderModifier:
                  remove:
                    - Range
            matches:
              - path:
                  type: PathPrefix
                  value: /library/streams
            backendRefs:
              - name: plex
                port: 32400
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - name: plex
                port: 32400
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
      tmp:
        type: emptyDir
      tvshows:
        type: nfs
        server: storage.cooney.site
        path: /mnt/bytebarn/media/tv
        advancedMounts:
          plex:
            app:
              - path: /mnt/bytebarn/media/tv
                readOnly: true
      movies:
        type: nfs
        server: storage.cooney.site
        path: /mnt/bytebarn/media/movies
        advancedMounts:
          plex:
            app:
              - path: /mnt/bytebarn/media/movies
                readOnly: true
      transcode:
        type: nfs
        server: storage.cooney.site
        path: /mnt/bytebarn/media/transcode
        advancedMounts:
          plex:
            app:
              - path: /mnt/bytebarn/media/transcode
                readOnly: false
