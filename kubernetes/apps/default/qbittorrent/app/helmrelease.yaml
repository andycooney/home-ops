---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: qbittorrent
spec:
  chartRef:
    kind: OCIRepository
    name: qbittorrent
  interval: 1h
  timeout: 15m
  values:
    controllers:
      qbittorrent:
        containers:
          port-sync:
            image:
              repository: docker.io/curlimages/curl
              tag: 8.20.0
            command:
              - /bin/sh
              - /scripts/port-sync.sh
            env:
              TZ: America/New_York
            resources:
              requests:
                cpu: 1m
                memory: 32Mi
              limits:
                memory: 128Mi
          pia-port-forward:
            image:
              repository: ghcr.io/andycooney/qbittorrent-pia-port-forward
              tag: sha-2ce6208d13b2
            command:
              - /bin/sh
              - /scripts/pia-port-forward.sh
            env:
              PORT_FILE: /tmp/gluetun/forwarded_port
              RENEW_SECONDS: "43200"
              STARTUP_TIMEOUT_SECONDS: "180"
            envFrom:
              - secretRef:
                  name: qbittorrent-vpn-secret
            resources:
              requests:
                cpu: 1m
                memory: 32Mi
              limits:
                memory: 128Mi
            securityContext:
              allowPrivilegeEscalation: false

          gluetun:
            image:
              repository: ghcr.io/qdm12/gluetun
              tag: v3.41.1
            env:
              VPN_SERVICE_PROVIDER: custom
              VPN_TYPE: wireguard
              WIREGUARD_CONF_SECRET_FILE: /gluetun/wireguard/wg0.conf
              VPN_PORT_FORWARDING: "off"
              VPN_PORT_FORWARDING_STATUS_FILE: /tmp/gluetun/forwarded_port
              FIREWALL_INPUT_PORTS: "80"
              FIREWALL_OUTBOUND_SUBNETS: 172.16.20.0/22,172.16.24.0/22,192.168.0.0/16,172.16.0.0/12
              DNS_ADDRESS: 1.1.1.1
              DOT: "off"
              IPV6: "off"
              VPN_IPV6: "off"
              DOT_IPV6: "off"
              TZ: America/New_York
            envFrom:
              - secretRef:
                  name: qbittorrent-vpn-secret
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              allowPrivilegeEscalation: false
              capabilities:
                add: ["NET_ADMIN"]
            resources:
              requests:
                cpu: 5m
                memory: 64Mi
              limits:
                memory: 512Mi
          app:
            image:
              repository: ghcr.io/home-operations/qbittorrent-libtorrentv1
              tag: 5.2.3@sha256:8a15de24cabfca8041788773436cb176378ff7735e5cb0b2fd94984d4fac6968
            env:
              TZ: America/New_York
              QBT_WEBUI_PORT: &port 80
              QBT_TORRENTING_PORT: &torrentPort 31288
            probes:
              liveness:
                enabled: true
                spec:
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                spec:
                  tcpSocket:
                    port: *port
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext:
              runAsNonRoot: true
              runAsUser: 1000
              runAsGroup: 1000
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 25m
                memory: 256Mi
              limits:
                memory: 2Gi
    defaultPodOptions:
      terminationGracePeriodSeconds: 300
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        forceRename: "{{ .Release.Name }}"
        primary: true
        ports:
          http:
            port: *port
    route:
      internal:
        hostnames:
          - "{{ .Release.Name }}.cooney.site"
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
    persistence:
      tun:
        type: hostPath
        hostPath: /dev/net/tun
        hostPathType: CharDevice
        advancedMounts:
          qbittorrent:
            gluetun:
              - path: /dev/net/tun
      gluetun-tmp:
        type: emptyDir
        advancedMounts:
          qbittorrent:
            gluetun:
              - path: /tmp/gluetun
            port-sync:
              - path: /tmp/gluetun
            pia-port-forward:
              - path: /tmp/gluetun
      scripts:
        type: configMap
        name: qbittorrent-scripts
        advancedMounts:
          qbittorrent:
            port-sync:
              - path: /scripts/port-sync.sh
                subPath: port-sync.sh
                readOnly: true
            pia-port-forward:
              - path: /scripts/pia-port-forward.sh
                subPath: pia-port-forward.sh
                readOnly: true
              - path: /scripts/pia-ca.rsa.4096.crt
                subPath: pia-ca.rsa.4096.crt
                readOnly: true
      wireguard:
        type: secret
        name: qbittorrent-pia-wg-ca-ontario-secret
        advancedMounts:
          qbittorrent:
            gluetun:
              - path: /gluetun/wireguard/wg0.conf
                subPath: wg0.conf
      config:
        existingClaim: "{{ .Release.Name }}"
      media:
        type: nfs
        server: storage.cooney.site
        path: /mnt/bytebarn/media
        globalMounts:
          - path: /media
      unprocessed:
        type: nfs
        server: storage.cooney.site
        path: /mnt/bytebarn/unprocessed
        globalMounts:
          - path: /unprocessed
      tmp:
        type: emptyDir
