apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: zwave
spec:
  suspend: true
  targetNamespace: default
  commonMetadata:
    labels:
      app.kubernetes.io/name: zwave
  components:
    - ../../../../components/volsync
  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph
  path: ./kubernetes/apps/default/zwave/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  postBuild:
    substitute:
      APP: zwave
      VOLSYNC_CLAIM: zwave
      VOLSYNC_SECRET_KEY: zwave
      VOLSYNC_CAPACITY: 5Gi
