---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ${APP}-volsync
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: ${APP}-volsync-secret
  data:
    - secretKey: KOPIA_REPOSITORY
      remoteRef:
        key: ${VOLSYNC_SECRET_KEY:=${APP}}
        property: KOPIA_REPOSITORY
    - secretKey: KOPIA_PASSWORD
      remoteRef:
        key: ${VOLSYNC_SECRET_KEY:=${APP}}
        property: KOPIA_PASSWORD
