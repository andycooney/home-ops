---
clusterName: kubernetes

talosVersion: "${talosVersion}"
kubernetesVersion: "${kubernetesVersion}"

endpoint: https://192.168.42.20:6443
additionalApiServerCertSans: &sans
  - "127.0.0.1"
  - "192.168.42.20"
  - "kube.cooney.site"
  - "talos.cooney.site"
  - "talos01.cooney.site"
  - "talos02.cooney.site"
  - "talos03.cooney.site"
  - "192.168.42.20"
additionalMachineCertSans: *sans

clusterPodNets: ["10.42.0.0/16"]
clusterSvcNets: ["10.43.0.0/16"]

# Disable built-in CNI to use Cilium
cniConfig:
  name: none

nodes:
  - hostname: "talos01"
    ipAddress: "192.168.42.11"
    installDisk: "/dev/nvme1n1"
    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/039535a70c3bd1667c355eca78571267704e55c8a24785033d183b8f26e39d82
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "58:47:ca:7d:7b:81"
        dhcp: false
        addresses:
          - "192.168.42.11/24"
        routes:
          - gateway: "192.168.42.1"
            network: 0.0.0.0/0
        mtu: 1500
        vip:
          ip: "192.168.42.20"
  - hostname: "talos02"
    ipAddress: "192.168.42.12"
    installDisk: "/dev/nvme1n1"
    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/039535a70c3bd1667c355eca78571267704e55c8a24785033d183b8f26e39d82
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "04:0e:3c:94:ac:ef"
        dhcp: false
        addresses:
          - "192.168.42.12/24"
        routes:
          - gateway: "192.168.42.1"
            network: 0.0.0.0/0
        mtu: 1500
        vip:
          ip: "192.168.42.20"
  - hostname: "talos03"
    ipAddress: "192.168.42.13"
    installDisk: "/dev/nvme1n1"
    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/039535a70c3bd1667c355eca78571267704e55c8a24785033d183b8f26e39d82
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "e8:d8:d1:44:b3:87"
        dhcp: false
        addresses:
          - "192.168.42.13/24"
        routes:
          - gateway: "192.168.42.1"
            network: 0.0.0.0/0
        mtu: 1500
        vip:
          ip: "192.168.42.20"

# Global patches
patches:
  - "@./patches/global/machine-files.yaml"
  - "@./patches/global/machine-features.yaml"
  - "@./patches/global/machine-kubelet.yaml"
  - "@./patches/global/machine-network.yaml"
  - "@./patches/global/machine-sysctls.yaml"
  - "@./patches/global/machine-time.yaml"

# Controller patches
controlPlane:
  patches:
    - "@./patches/controller/cluster.yaml"
