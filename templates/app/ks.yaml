---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: APP_NAME
spec:
  interval: 1h
  path: ./kubernetes/apps/NAMESPACE/APP_NAME/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: NAMESPACE
  wait: true
