---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: APP_NAME
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: APP_NAME
  values:
    controllers:
      APP_NAME:
        containers:
          app:
            resources:
              requests:
                cpu: 25m
                memory: 128Mi
              limits:
                memory: 512Mi
